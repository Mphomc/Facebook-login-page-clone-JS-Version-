<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero-right">
    <h1>Log in to Facebook</h1>

    <form id="login-form" class="login-box">
        <input type="text" placeholder="Email address or mobile number" name="login" id="login" class="login-input">
        <input type="password" placeholder="Password" name="password" id="password" class="login-input">
        <button type="submit" class="login-button">Log in</button>
    </form>
     <div class="links">
    <a href="#" class="forgot-password">Forgotten password?</a>
    <a href="#" class="create-account">Create new account</a>
     </div>

    <footer>
  <p>Meta</p>
</footer>

    </div>
    



 <script src="script.js"></script>
